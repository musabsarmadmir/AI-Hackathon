version: '3.8'
services:
  backend:
    build:
      context: ./
      dockerfile: kisanmind/Dockerfile
    container_name: kisanmind-backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENWEATHER_KEY=${OPENWEATHER_KEY}
      - GOOGLE_MAPS_KEY=${GOOGLE_MAPS_KEY}
    volumes:
      - ./kisanmind/backend:/app

  streamlit:
    build:
      context: ./
      dockerfile: kisanmind/streamlit.Dockerfile
    container_name: kisanmind-streamlit
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_API_BASE=http://backend:8000
    depends_on:
      - backend
